<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dashboard — Parent Portal</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">
                <!-- Child info banner -->
                <div class="card"
                    style="margin-bottom:1.25rem;background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(37,99,235,.1));border-color:rgba(245,158,11,.25)"
                    id="child-banner">
                    <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
                        <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--primary));display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;flex-shrink:0;overflow:hidden"
                            id="child-avatar">?</div>
                        <div>
                            <div style="font-family:'Outfit';font-size:1.2rem;font-weight:700;color:var(--text-primary)"
                                id="child-name">—</div>
                            <div id="child-class" style="color:var(--text-secondary);font-size:.85rem"></div>
                        </div>
                        <div style="margin-left:auto">
                            <span class="badge badge-success" style="font-size:.75rem">Active Student</span>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stat-grid" id="stat-grid">
                    <div class="stat-card skeleton" style="height:90px"></div>
                    <div class="stat-card skeleton" style="height:90px"></div>
                    <div class="stat-card skeleton" style="height:90px"></div>
                    <div class="stat-card skeleton" style="height:90px"></div>
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
                    <!-- Latest Marks -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">📊 Latest Marks (FA1)</h3>
                            <a href="/parent/marks.html" style="font-size:.8rem;color:var(--primary-light)">View All
                                →</a>
                        </div>
                        <div id="marks-mini"></div>
                    </div>

                    <!-- Attendance Overview -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">✅ Attendance Overview</h3>
                            <a href="/parent/attendance.html" style="font-size:.8rem;color:var(--primary-light)">View
                                Details →</a>
                        </div>
                        <div id="att-mini"></div>
                    </div>
                </div>

                <!-- Quick Links -->
                <div class="card" style="margin-top:1.25rem">
                    <h3 class="card-title" style="margin-bottom:1rem">⚡ Quick Access</h3>
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem">
                        <a href="/parent/marks.html"><button class="btn btn-secondary w-full">📊 View Marks</button></a>
                        <a href="/parent/attendance.html"><button class="btn btn-secondary w-full">✅
                                Attendance</button></a>
                        <a href="/parent/timetable.html"><button class="btn btn-secondary w-full">📅
                                Timetable</button></a>
                        <a href="/parent/faculty.html"><button class="btn btn-secondary w-full">👩‍🏫 Contact
                                Faculty</button></a>
                        <a href="/parent/calendar.html"><button class="btn btn-secondary w-full">📆
                                Calendar</button></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/parent-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildParentSidebar('dashboard');
        document.getElementById('topbar-container').innerHTML = buildParentTopBar('Dashboard');

        (async () => {
            const data = await initParentPage();
            if (!data) return;
            const { parent, student } = data;

            const childAv = document.getElementById('child-avatar');
            if (student && student.photo_url) {
                childAv.innerHTML = `<img src="${student.photo_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
            } else {
                childAv.textContent = (student?.name || 'S')[0];
            }
            document.getElementById('child-name').textContent = student?.name || 'No student linked';
            document.getElementById('child-class').textContent = student ? `Class ${student.class}${student.section} • ID: ${student.student_id}` : '';

            const [marksData, attData] = await Promise.all([
                api('GET', '/api/parent/student-marks'),
                api('GET', '/api/parent/attendance').catch(() => ({ stats: {}, records: [] }))
            ]);

            const fa1 = (marksData.marks || []).filter(m => m.exam_type === 'FA1');
            const avg = fa1.length ? (fa1.reduce((s, m) => s + m.percentage, 0) / fa1.length).toFixed(1) : '—';
            const s = attData.stats || {};

            document.getElementById('stat-grid').innerHTML = `
      <div class="stat-card" style="--stat-color:var(--primary);--stat-icon-bg:rgba(37,99,235,.15)">
        <div class="stat-icon">📊</div>
        <div class="stat-info"><div class="stat-value">${avg}%</div><div class="stat-label">Avg Marks (FA1)</div></div>
      </div>
      <div class="stat-card" style="--stat-color:var(--accent);--stat-icon-bg:rgba(245,158,11,.15)">
        <div class="stat-icon">🏆</div>
        <div class="stat-info"><div class="stat-value">#${marksData.rank || '—'} / ${marksData.totalStudents || '—'}</div><div class="stat-label">Class Rank</div></div>
      </div>
      <div class="stat-card" style="--stat-color:var(--success);--stat-icon-bg:rgba(16,185,129,.15)">
        <div class="stat-icon">✅</div>
        <div class="stat-info"><div class="stat-value">${s.percentage || '—'}%</div><div class="stat-label">Attendance Rate</div></div>
      </div>
      <div class="stat-card" style="--stat-color:var(--danger);--stat-icon-bg:rgba(239,68,68,.15)">
        <div class="stat-icon">❌</div>
        <div class="stat-info"><div class="stat-value">${s.absent || '0'}</div><div class="stat-label">Days Absent</div></div>
      </div>
    `;

            document.getElementById('marks-mini').innerHTML = fa1.slice(0, 5).map(m => {
                const g = getGrade(m.percentage);
                return `<div class="info-item"><span class="info-key">${m.subject}</span><span style="display:flex;gap:.5rem;align-items:center"><span class="info-val">${m.marks_obtained}/100</span><span class="${g.cls}" style="font-size:.75rem;font-weight:700">${g.grade}</span></span></div>`;
            }).join('') || '<p style="color:var(--text-muted);font-size:.85rem">No marks available.</p>';

            // Attendance mini widget
            document.getElementById('att-mini').innerHTML = `
              <div class="info-item"><span class="info-key">Attendance Rate</span><span class="info-val" style="color:var(--success);font-weight:700">${s.percentage || 0}%</span></div>
              <div class="info-item"><span class="info-key">Days Present</span><span class="info-val">${s.present || 0}</span></div>
              <div class="info-item"><span class="info-key">Days Absent</span><span class="info-val" style="color:var(--danger)">${s.absent || 0}</span></div>
              <div class="info-item"><span class="info-key">Days on Leave</span><span class="info-val" style="color:var(--warning)">${s.leave || 0}</span></div>
              <div class="info-item"><span class="info-key">Total Working Days</span><span class="info-val">${s.total || 0}</span></div>
              <a href="/parent/attendance.html"><button class="btn btn-secondary btn-sm w-full" style="margin-top:.75rem">📋 Full Attendance Log</button></a>
            `;

            hideLoader();
        })();

    </script>
</body>

</html>
