<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Marks & Grades — Student Portal</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">
                <!-- Rank card -->
                <div class="card"
                    style="margin-bottom:1.25rem;background:linear-gradient(135deg,rgba(37,99,235,.15),rgba(13,148,136,.1));border-color:rgba(37,99,235,.3)">
                    <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
                        <div style="font-size:3rem">🏆</div>
                        <div>
                            <div style="font-family:'Outfit';font-size:2rem;font-weight:800;line-height:1"
                                id="rank-display">—</div>
                            <div style="color:var(--text-secondary);font-size:.85rem">Class Rank (FA1)</div>
                        </div>
                        <div style="margin-left:auto;text-align:right">
                            <div id="overall-pct"
                                style="font-family:'Outfit';font-size:1.5rem;font-weight:700;color:var(--teal-light)">—
                            </div>
                            <div style="font-size:.8rem;color:var(--text-muted)">Overall Average</div>
                        </div>
                    </div>
                </div>

                <!-- Exam tabs -->
                <div id="exam-tabs" style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap"></div>

                <!-- Marks table -->
                <div class="card">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Subject</th>
                                    <th>Marks</th>
                                    <th>Percentage</th>
                                    <th>Grade</th>
                                    <th>Performance</th>
                                </tr>
                            </thead>
                            <tbody id="marks-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/student-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildStudentSidebar('marks');
        document.getElementById('topbar-container').innerHTML = buildStudentTopBar('Marks & Grades');

        let allMarks = [];
        let activeExam = 'FA1';

        function renderMarks() {
            const filtered = allMarks.filter(m => m.exam_type === activeExam);
            const avg = filtered.length ? (filtered.reduce((s, m) => s + m.percentage, 0) / filtered.length).toFixed(1) : 0;

            document.getElementById('marks-tbody').innerHTML = filtered.map(m => {
                const g = getGrade(m.percentage);
                return `<tr>
        <td><strong>${m.subject}</strong></td>
        <td>${m.marks_obtained} / ${m.max_marks}</td>
        <td>${m.percentage}%</td>
        <td><span class="badge ${m.percentage >= 60 ? 'badge-success' : 'badge-danger'} ${g.cls}">${g.grade}</span></td>
        <td style="width:180px">
          <div style="display:flex;align-items:center;gap:.5rem">
            <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${m.percentage}%"></div></div>
            <span style="font-size:.75rem;color:var(--text-muted)">${m.percentage}%</span>
          </div>
        </td>
      </tr>`;
            }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem">No marks recorded for this exam.</td></tr>';

            document.getElementById('overall-pct').textContent = avg + '%';
        }

        (async () => {
            await initStudentPage();
            const data = await api('GET', '/api/student/marks');
            allMarks = data.marks;

            document.getElementById('rank-display').textContent = `#${data.rank} of ${data.totalStudents}`;

            // Exam type tabs
            document.getElementById('exam-tabs').innerHTML = data.examTypes.map(t => `
      <button class="btn ${t === 'FA1' ? 'btn-primary' : 'btn-secondary'} btn-sm" 
        id="tab-${t}" onclick="switchTab('${t}')">${t}</button>
    `).join('');

            renderMarks();
            hideLoader();
        })();

        function switchTab(exam) {
            activeExam = exam;
            document.querySelectorAll('#exam-tabs button').forEach(b => {
                b.className = 'btn btn-secondary btn-sm';
            });
            document.getElementById('tab-' + exam).className = 'btn btn-primary btn-sm';
            renderMarks();
        }
    </script>
</body>

</html>
