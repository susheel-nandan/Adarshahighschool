<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Timetable — Student Portal</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .tt-wrapper {
            overflow-x: auto;
        }

        .tt-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        .tt-table th,
        .tt-table td {
            border: 1px solid var(--border);
            padding: .6rem .5rem;
            font-size: .78rem;
            vertical-align: top;
            min-width: 100px;
        }

        .tt-table th {
            background: rgba(37, 99, 235, .12);
            text-align: center;
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tt-table .period-col {
            background: rgba(255, 255, 255, .03);
            text-align: center;
            font-weight: 700;
            font-size: .7rem;
            color: var(--text-secondary);
            width: 70px;
        }

        .tt-slot {
            border-radius: 6px;
            padding: .4rem .5rem;
        }

        .tt-slot.filled {
            background: rgba(37, 99, 235, .12);
        }

        .tt-slot.break-slot {
            background: rgba(255, 255, 255, .04);
            text-align: center;
            color: var(--text-muted);
            font-size: .72rem;
        }
    </style>
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">📅 Weekly Class Timetable</h3>
                        <div id="class-label" style="font-size:.82rem;color:var(--text-muted)"></div>
                    </div>
                    <div class="tt-wrapper">
                        <table class="tt-table" id="tt-table">
                            <thead>
                                <tr id="tt-head"></tr>
                            </thead>
                            <tbody id="tt-body"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card" style="margin-top:1rem">
                    <h3 class="card-title" style="margin-bottom:.75rem">🕐 Period Timings</h3>
                    <div id="timing-list" style="display:flex;flex-wrap:wrap;gap:.5rem"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/student-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildStudentSidebar('timetable');
        document.getElementById('topbar-container').innerHTML = buildStudentTopBar('Class Timetable');

        (async () => {
            const profile = await initStudentPage();
            if (!profile) return;
            document.getElementById('class-label').textContent = `Class ${profile.class}${profile.section}`;

            const rows = await api('GET', '/api/student/timetable');
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const maxPeriods = 11;
            const staticTimeMap = {
                1: '08:10 – 08:50', 2: '08:50 – 09:30', 3: '09:30 – 10:10',
                4: '10:20 – 11:00', 5: '11:00 – 11:40', 6: '11:40 – 12:20',
                7: '13:00 – 13:40', 8: '13:40 – 14:20', 9: '14:20 – 15:00',
                10: '15:10 – 15:50', 11: '15:50 – 16:30'
            };

            // Build map: day -> { period -> {subject, faculty, time} }
            const map = {};
            days.forEach(d => { map[d] = {}; });
            rows.forEach(r => { map[r.day][r.period] = r; });

            // Collect unique time slots
            const timeMap = {};
            rows.forEach(r => { timeMap[r.period] = r.start_time + ' – ' + r.end_time; });

            // Header
            document.getElementById('tt-head').innerHTML =
                '<th class="period-col">Period</th>' +
                days.map(d => `<th>${d}</th>`).join('');

            // Break after period 3 (10:10–10:20), lunch after period 6 (12:20–13:00), break after period 9 (15:00–15:10)
            let bodyHTML = `<tr><td class="period-col" style="font-size:.65rem">🙏 Prayer<br/>08:05–08:10</td>${days.map(() => '<td><div class="tt-slot break-slot">PRAYER</div></td>').join('')}</tr>`;
            for (let p = 1; p <= maxPeriods; p++) {
                if (p === 4) bodyHTML += `<tr><td class="period-col" style="font-size:.65rem">☕ Break<br/>10:10–10:20</td>${days.map(() => '<td><div class="tt-slot break-slot">SHORT BREAK</div></td>').join('')}</tr>`;
                if (p === 7) bodyHTML += `<tr><td class="period-col" style="font-size:.65rem">🍽️ Lunch<br/>12:20–13:00</td>${days.map(() => '<td><div class="tt-slot break-slot">LUNCH BREAK</div></td>').join('')}</tr>`;
                if (p === 10) bodyHTML += `<tr><td class="period-col" style="font-size:.65rem">☕ Break<br/>15:00–15:10</td>${days.map(() => '<td><div class="tt-slot break-slot">SHORT BREAK</div></td>').join('')}</tr>`;

                bodyHTML += '<tr>';
                bodyHTML += `<td class="period-col">P${p}<br/><span style="font-size:.65rem;color:var(--text-muted)">${timeMap[p] || staticTimeMap[p]}</span></td>`;
                days.forEach(d => {
                    const cell = map[d][p];
                    if (cell) {
                        bodyHTML += `<td><div class="tt-slot filled">
            <div class="tt-subject">${cell.subject}</div>
            <div class="tt-faculty">${cell.faculty}</div>
          </div></td>`;
                    } else {
                        bodyHTML += '<td><div class="tt-slot break-slot" style="font-size:.7rem">—</div></td>';
                    }
                });
                bodyHTML += '</tr>';
            }
            document.getElementById('tt-body').innerHTML = bodyHTML;

            // Timing pills
            document.getElementById('timing-list').innerHTML = Array.from({ length: maxPeriods }, (_, i) => i + 1)
                .map(p => `<span style="background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);border-radius:20px;padding:.2rem .7rem;font-size:.72rem;color:var(--text-secondary)">P${p}: ${timeMap[p] || staticTimeMap[p]}</span>`)
                .join('');

            hideLoader();
        })();
    </script>
</body>

</html>
