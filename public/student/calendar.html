<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Calendar — Student Portal</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">
                <div style="display:grid;grid-template-columns:1fr 340px;gap:1.25rem;align-items:start;flex-wrap:wrap">
                    <!-- Calendar -->
                    <div class="card">
                        <div class="card-header" style="margin-bottom:1rem">
                            <h3 class="card-title">📆 <span id="cal-month-label"></span></h3>
                            <div style="display:flex;gap:.5rem">
                                <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">‹ Prev</button>
                                <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">Next ›</button>
                            </div>
                        </div>
                        <!-- Legend -->
                        <div
                            style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;font-size:.75rem;color:var(--text-secondary)">
                            <span style="display:flex;gap:.35rem;align-items:center"><span
                                    style="width:10px;height:10px;border-radius:3px;background:var(--danger);display:inline-block"></span>Holiday</span>
                            <span style="display:flex;gap:.35rem;align-items:center"><span
                                    style="width:10px;height:10px;border-radius:3px;background:var(--warning);display:inline-block"></span>Exam</span>
                            <span style="display:flex;gap:.35rem;align-items:center"><span
                                    style="width:10px;height:10px;border-radius:3px;background:var(--teal);display:inline-block"></span>Event</span>
                            <span style="display:flex;gap:.35rem;align-items:center"><span
                                    style="width:10px;height:10px;border-radius:3px;background:var(--primary);display:inline-block"></span>Today</span>
                        </div>
                        <div class="calendar-grid" id="cal-grid">
                            <div class="cal-day-header">Sun</div>
                            <div class="cal-day-header">Mon</div>
                            <div class="cal-day-header">Tue</div>
                            <div class="cal-day-header">Wed</div>
                            <div class="cal-day-header">Thu</div>
                            <div class="cal-day-header">Fri</div>
                            <div class="cal-day-header">Sat</div>
                        </div>
                    </div>

                    <!-- Events List -->
                    <div class="card">
                        <h3 class="card-title" style="margin-bottom:1rem">📋 All Events</h3>
                        <div id="events-list"
                            style="display:flex;flex-direction:column;gap:.6rem;max-height:500px;overflow-y:auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/student-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildStudentSidebar('calendar');
        document.getElementById('topbar-container').innerHTML = buildStudentTopBar('School Calendar');

        let currentDate = new Date('2026-02-28');
        let allEvents = [];

        const typeColors = { holiday: 'var(--danger)', exam: 'var(--warning)', event: 'var(--teal)', meeting: 'var(--primary)' };
        const typeIcons = { holiday: '🏖️', exam: '📝', event: '🎉', meeting: '👥' };

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('cal-month-label').textContent = months[month] + ' ' + year;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = '2026-02-28';

            const eventMap = {};
            allEvents.forEach(e => { const d = e.date.split('T')[0]; if (!eventMap[d]) eventMap[d] = []; eventMap[d].push(e); });

            const calGrid = document.getElementById('cal-grid');
            // Remove day cells (keep headers = first 7 items)
            while (calGrid.children.length > 7) calGrid.removeChild(calGrid.lastChild);

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'cal-day empty';
                empty.textContent = '';
                calGrid.appendChild(empty);
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const events = eventMap[dateStr] || [];
                const div = document.createElement('div');
                div.className = 'cal-day';
                if (dateStr === today) div.classList.add('today');
                else if (events.some(e => e.type === 'holiday')) div.classList.add('holiday');
                else if (events.some(e => e.type === 'exam')) div.classList.add('exam-day');
                else if (events.length) div.classList.add('event-day');
                div.innerHTML = `<span>${d}</span>${events.length ? `<span style="font-size:.5rem;margin-top:2px">${typeIcons[events[0].type] || '•'}</span>` : ''}`;
                if (events.length) {
                    div.title = events.map(e => e.title).join(', ');
                    div.style.cursor = 'pointer';
                }
                calGrid.appendChild(div);
            }
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        (async () => {
            await initStudentPage();
            allEvents = await api('GET', '/api/student/calendar');

            renderCalendar();

            // Events list
            document.getElementById('events-list').innerHTML = allEvents.map(e => `
      <div style="display:flex;gap:.75rem;align-items:flex-start;padding:.6rem;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid ${typeColors[e.type] || 'var(--primary)'}">
        <span style="font-size:1.1rem">${typeIcons[e.type] || '•'}</span>
        <div>
          <div style="font-weight:600;font-size:.85rem">${e.title}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">${fmtDate(e.date)}</div>
          ${e.description ? `<div style="font-size:.75rem;color:var(--text-secondary);margin-top:.2rem">${e.description}</div>` : ''}
        </div>
      </div>
    `).join('');

            hideLoader();
        })();
    </script>
</body>

</html>
