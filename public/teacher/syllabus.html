<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Syllabus — Teacher Portal</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">
                <button class="btn btn-sm" id="btn-back"
                    style="margin-bottom:1rem; background:rgba(255,255,255,0.7); color:#333; border:none;">← Back to
                    Class Hub</button>

                <div class="card" style="margin-bottom:1.5rem">
                    <div class="card-title">📖 Upload Syllabus</div>
                    <form id="syllabus-form" style="margin-top:1rem; max-width:600px">
                        <div class="form-group">
                            <label class="form-label">Syllabus Title</label>
                            <input type="text" id="syl-title" class="form-control" required
                                placeholder="e.g. Mid-Term Syllabus" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description (Optional)</label>
                            <textarea id="syl-desc" class="form-control" rows="3"
                                placeholder="Additional details"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">File URL (e.g. Google Drive link)</label>
                            <input type="url" id="syl-url" class="form-control" placeholder="https://" />
                        </div>
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </form>
                </div>

                <div class="card">
                    <div class="card-title">📚 Current Syllabus</div>
                    <div class="table-wrapper" style="margin-top:1rem">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Date Added</th>
                                    <th>Title</th>
                                    <th>Link</th>
                                </tr>
                            </thead>
                            <tbody id="syl-body"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="/js/utils.js"></script>
    <script src="/js/teacher-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildTeacherSidebar('dashboard');
        document.getElementById('topbar-container').innerHTML = buildTeacherTopBar('Syllabus');

        let class_id, subject_id;

        async function loadSyllabus() {
            const data = await api('GET', `/api/teacher/syllabus?class_id=${class_id}&subject_id=${subject_id}`).catch(() => null);
            if (!data) return;

            const tbody = document.getElementById('syl-body');
            if (!data.syllabus.length) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">No syllabus uploaded yet.</td></tr>';
            } else {
                tbody.innerHTML = data.syllabus.map(s => `
                    <tr>
                        <td>${new Date(s.created_at).toLocaleDateString()}</td>
                        <td style="font-weight:600">${s.title}<br><span style="font-weight:normal;font-size:0.8rem;color:var(--text-muted)">${s.description || ''}</span></td>
                        <td>${s.file_url ? `<a href="${s.file_url}" target="_blank" class="btn btn-sm" style="background:var(--teal);color:white">View File</a>` : '—'}</td>
                    </tr>
                `).join('');
            }
        }

        document.getElementById('syllabus-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Uploading...';

            try {
                await api('POST', '/api/teacher/syllabus', {
                    class_id, subject_id,
                    title: document.getElementById('syl-title').value,
                    description: document.getElementById('syl-desc').value,
                    file_url: document.getElementById('syl-url').value
                });
                showToast('✅ Syllabus uploaded successfully', 'success');
                e.target.reset();
                await loadSyllabus();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload';
            }
        });

        (async () => {
            await initTeacherPage();

            const params = new URLSearchParams(window.location.search);
            class_id = params.get('class_id');
            subject_id = params.get('subject_id');

            if (!class_id || !subject_id) {
                showToast('Invalid context. Go to Dashboard.', 'error');
                return;
            }

            document.getElementById('btn-back').onclick = () => window.location.href = `/teacher/class-dashboard.html${window.location.search}`;

            await loadSyllabus();
            hideLoader();
        })();
    </script>
</body>

</html>
