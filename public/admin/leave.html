<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Leave Requests — Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">
                <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem">
                    <select class="form-control" id="filter-status" style="width:auto" onchange="filter()">
                        <option value="Pending">Pending</option>
                        <option value="Approved">Approved</option>
                        <option value="Rejected">Rejected</option>
                        <option value="ALL">All</option>
                    </select>
                    <div id="count" style="font-size:.82rem;color:var(--text-muted);margin-left:auto"></div>
                </div>
                <div class="card">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Student</th>
                                    <th>Class</th>
                                    <th>From</th>
                                    <th>To</th>
                                    <th>Reason</th>
                                    <th>Submitted</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/utils.js"></script>
    <script src="/js/admin-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildAdminSidebar('leave');
        document.getElementById('topbar-container').innerHTML = buildAdminTopBar('Leave Requests');
        let all = [];

        function filter() {
            const f = document.getElementById('filter-status').value;
            const list = f === 'ALL' ? all : all.filter(r => r.status === f);
            document.getElementById('count').textContent = `${list.length} request(s)`;
            document.getElementById('tbody').innerHTML = list.map(r => {
                const sb = r.status === 'Approved' ? 'badge-success' : r.status === 'Rejected' ? 'badge-danger' : 'badge-warning';
                const actions = r.status === 'Pending' ?
                    `<button class="btn btn-success btn-sm" onclick="approve(${r.id})">✅ Approve</button>
         <button class="btn btn-danger btn-sm" onclick="reject(${r.id})">❌ Reject</button>`
                    : `<span style="font-size:.75rem;color:var(--text-muted)">${r.status}</span>`;
                return `<tr>
        <td><strong>${r.student_name}</strong><br/><span style="font-size:.72rem;color:var(--text-muted)">${r.student_id}</span></td>
        <td>Class ${r.class}${r.section}</td>
        <td>${fmtDate(r.from_date)}</td>
        <td>${fmtDate(r.to_date)}</td>
        <td style="max-width:200px;font-size:.8rem">${r.reason}</td>
        <td style="font-size:.75rem">${r.submitted_at?.split('T')[0] || ''}</td>
        <td><span class="badge ${sb}">${r.status}</span></td>
        <td style="display:flex;gap:.35rem;flex-wrap:wrap">${actions}</td>
      </tr>`;
            }).join('') || `<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:2rem">No requests found.</td></tr>`;
        }

        async function approve(id) { await api('PUT', `/api/admin/leave-requests/${id}`, { status: 'Approved' }); showToast('Approved!', 'success'); load(); }
        async function reject(id) { await api('PUT', `/api/admin/leave-requests/${id}`, { status: 'Rejected' }); showToast('Rejected', 'success'); load(); }

        async function load() { all = await api('GET', '/api/admin/leave-requests'); filter(); }
        (async () => { await initAdminPage(); await load(); hideLoader(); })();
    </script>
</body>

</html>
