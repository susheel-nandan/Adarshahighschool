<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Faculty — Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">
                <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem">
                    <input class="form-control" id="search" type="text" placeholder="🔍 Search name or subject..."
                        oninput="filter()" style="max-width:280px" />
                    <button class="btn btn-success btn-sm" onclick="openAdd()">➕ Add Faculty</button>
                </div>
                <div class="card">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Subject</th>
                                    <th>Qualification</th>
                                    <th>Mobile</th>
                                    <th>Experience</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal (shared for add/edit) -->
    <div class="modal-overlay" id="modal">
        <div class="modal" style="max-width:480px">
            <div class="modal-header">
                <h3 style="font-size:1rem;font-weight:700" id="modal-title">Faculty</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form id="modal-form">
                <input type="hidden" id="f-id" />
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Full Name *</label><input class="form-control"
                            id="f-name" required /></div>
                    <div class="form-group"><label class="form-label">Subject *</label><input class="form-control"
                            id="f-subject" required /></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Mobile *</label><input class="form-control"
                            id="f-mobile" required /></div>
                    <div class="form-group"><label class="form-label">Email</label><input class="form-control"
                            id="f-email" type="email" /></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Qualification</label><input class="form-control"
                            id="f-qual" /></div>
                    <div class="form-group"><label class="form-label">Experience (yrs)</label><input
                            class="form-control" id="f-exp" type="number" min="0" value="0" /></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.5rem">
                    <button type="button" class="btn btn-danger btn-sm" id="del-btn" onclick="deleteFaculty()">🗑️
                        Delete</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/admin-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildAdminSidebar('faculty');
        document.getElementById('topbar-container').innerHTML = buildAdminTopBar('Manage Faculty');
        let all = [];

        function render(list) {
            document.getElementById('tbody').innerHTML = list.map(f => `<tr>
      <td><strong>${f.name}</strong></td><td>${f.subject}</td>
      <td style="font-size:.8rem">${f.qualification || '—'}</td>
      <td>${f.mobile}</td>
      <td>${f.experience} yrs</td>
      <td><button class="btn btn-primary btn-sm" onclick="openEdit(${f.id})">✏️ Edit</button></td>
    </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem">No faculty found.</td></tr>';
        }
        function filter() { const q = document.getElementById('search').value.toLowerCase(); render(all.filter(f => !q || f.name.toLowerCase().includes(q) || f.subject.toLowerCase().includes(q))); }
        function closeModal() { document.getElementById('modal').classList.remove('open'); document.getElementById('modal-form').reset(); document.getElementById('f-id').value = ''; }
        function openAdd() { document.getElementById('modal-title').textContent = '➕ Add Faculty'; document.getElementById('del-btn').style.display = 'none'; closeModal(); document.getElementById('modal').classList.add('open'); }
        function openEdit(id) {
            const f = all.find(x => x.id === id);
            document.getElementById('modal-title').textContent = '✏️ Edit Faculty';
            document.getElementById('f-id').value = f.id; document.getElementById('f-name').value = f.name;
            document.getElementById('f-subject').value = f.subject; document.getElementById('f-mobile').value = f.mobile;
            document.getElementById('f-email').value = f.email || ''; document.getElementById('f-qual').value = f.qualification || '';
            document.getElementById('f-exp').value = f.experience;
            document.getElementById('del-btn').style.display = '';
            document.getElementById('modal').classList.add('open');
        }
        document.getElementById('modal-form').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const payload = { name: document.getElementById('f-name').value, subject: document.getElementById('f-subject').value, mobile: document.getElementById('f-mobile').value, email: document.getElementById('f-email').value, qualification: document.getElementById('f-qual').value, experience: document.getElementById('f-exp').value };
            try {
                if (id) await api('PUT', `/api/admin/faculty/${id}`, payload);
                else await api('POST', '/api/admin/faculty', payload);
                showToast(id ? 'Faculty updated!' : 'Faculty added!', 'success'); closeModal(); load();
            } catch (err) { showToast(err.message, 'error'); }
        });
        async function deleteFaculty() {
            const id = document.getElementById('f-id').value;
            if (!id || !confirm('Delete this faculty member?')) return;
            await api('DELETE', `/api/admin/faculty/${id}`); showToast('Deleted', 'success'); closeModal(); load();
        }
        async function load() { all = await api('GET', '/api/admin/faculty'); filter(); }
        (async () => { await initAdminPage(); await load(); hideLoader(); })();
    </script>
</body>

</html>
