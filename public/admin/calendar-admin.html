<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Calendar Events — Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">
                <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem">
                    <select class="form-control" id="filter-type" style="width:auto" onchange="filterRender()">
                        <option value="">All Types</option>
                        <option value="holiday">Holiday</option>
                        <option value="event">Event</option>
                        <option value="exam">Exam</option>
                        <option value="meeting">Meeting</option>
                    </select>
                    <button class="btn btn-success btn-sm" onclick="openAdd()">➕ Add Event</button>
                    <div id="ecount" style="font-size:.82rem;color:var(--text-muted);margin-left:auto"></div>
                </div>
                <div class="card">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Title</th>
                                    <th>Type</th>
                                    <th>Description</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal" style="max-width:460px">
            <div class="modal-header">
                <h3 style="font-size:1rem;font-weight:700" id="modal-title">Add Event</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form id="modal-form">
                <input type="hidden" id="ev-id" />
                <div class="form-group"><label class="form-label">Title *</label><input class="form-control"
                        id="ev-title" required /></div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Date *</label><input class="form-control"
                            id="ev-date" type="date" required /></div>
                    <div class="form-group">
                        <label class="form-label">Type *</label>
                        <select class="form-control" id="ev-type" required>
                            <option value="holiday">Holiday</option>
                            <option value="event">Event</option>
                            <option value="exam">Exam</option>
                            <option value="meeting">Meeting</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label class="form-label">Description</label><textarea class="form-control"
                        id="ev-desc" rows="2" style="resize:vertical"></textarea></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.5rem">
                    <button type="button" class="btn btn-danger btn-sm" id="del-btn" onclick="deleteEvent()"
                        style="display:none">🗑️ Delete</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/admin-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildAdminSidebar('calendar-admin');
        document.getElementById('topbar-container').innerHTML = buildAdminTopBar('Calendar Events');
        let all = [];

        const typeMeta = { holiday: { badge: 'badge-danger' }, event: { badge: 'badge-primary' }, exam: { badge: 'badge-warning' }, meeting: { badge: 'badge-success' } };

        function filterRender() {
            const ft = document.getElementById('filter-type').value;
            const list = ft ? all.filter(e => e.type === ft) : all;
            document.getElementById('ecount').textContent = `${list.length} event(s)`;
            document.getElementById('tbody').innerHTML = list.map(e => {
                const m = typeMeta[e.type] || { badge: 'badge-primary' };
                return `<tr>
        <td>${fmtDate(e.date)}</td>
        <td><strong>${e.title}</strong></td>
        <td><span class="badge ${m.badge}">${e.type.charAt(0).toUpperCase() + e.type.slice(1)}</span></td>
        <td style="font-size:.8rem;color:var(--text-muted)">${e.description || '—'}</td>
        <td><button class="btn btn-primary btn-sm" onclick="openEdit(${e.id})">✏️ Edit</button></td>
      </tr>`;
            }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem">No events found.</td></tr>';
        }

        function closeModal() { document.getElementById('modal').classList.remove('open'); document.getElementById('modal-form').reset(); }
        function openAdd() { document.getElementById('modal-title').textContent = '➕ Add Event'; document.getElementById('ev-id').value = ''; document.getElementById('del-btn').style.display = 'none'; document.getElementById('modal').classList.add('open'); }
        function openEdit(id) {
            const e = all.find(x => x.id === id);
            document.getElementById('modal-title').textContent = '✏️ Edit Event';
            document.getElementById('ev-id').value = e.id;
            document.getElementById('ev-title').value = e.title;
            document.getElementById('ev-date').value = e.date;
            document.getElementById('ev-type').value = e.type;
            document.getElementById('ev-desc').value = e.description || '';
            document.getElementById('del-btn').style.display = '';
            document.getElementById('modal').classList.add('open');
        }
        document.getElementById('modal-form').addEventListener('submit', async ev => {
            ev.preventDefault();
            const id = document.getElementById('ev-id').value;
            const payload = { title: document.getElementById('ev-title').value, date: document.getElementById('ev-date').value, type: document.getElementById('ev-type').value, description: document.getElementById('ev-desc').value };
            try {
                if (id) await api('PUT', `/api/admin/calendar/${id}`, payload);
                else await api('POST', '/api/admin/calendar', payload);
                showToast(id ? 'Event updated!' : 'Event added!', 'success'); closeModal(); load();
            } catch (e) { showToast(e.message, 'error'); }
        });
        async function deleteEvent() {
            const id = document.getElementById('ev-id').value;
            if (!id || !confirm('Delete this event?')) return;
            await api('DELETE', `/api/admin/calendar/${id}`); showToast('Deleted', 'success'); closeModal(); load();
        }
        async function load() { all = await api('GET', '/api/admin/calendar'); filterRender(); }
        (async () => { await initAdminPage(); await load(); hideLoader(); window.closeSidebar(); })();
    </script>
</body>

</html>
