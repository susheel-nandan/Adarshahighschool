<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Exam Schedule — Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div id="page-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content animate-fade">

                <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem">
                    <select class="form-control" id="filter-class" style="width:auto" onchange="loadExams()">
                        <option value="">All Classes</option>
                        <option value="6">Class 6</option>
                        <option value="7">Class 7</option>
                        <option value="8">Class 8</option>
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                    </select>
                    <select class="form-control" id="filter-exam" style="width:auto" onchange="filterRender()">
                        <option value="">All Exam Types</option>
                        <option>FA1</option>
                        <option>FA2</option>
                        <option>SA1</option>
                        <option>SA2</option>
                    </select>
                    <button class="btn btn-success btn-sm" onclick="openAddModal()">➕ Add Exam Entry</button>
                    <div id="ecount" style="font-size:.82rem;color:var(--text-muted);margin-left:auto"></div>
                </div>

                <div class="card">
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Class</th>
                                    <th>Subject</th>
                                    <th>Exam Type</th>
                                    <th>Date</th>
                                    <th>Start Time</th>
                                    <th>Duration</th>
                                    <th>Syllabus</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal" style="max-width:480px">
            <div class="modal-header">
                <h3 style="font-size:1rem;font-weight:700" id="modal-title">Add Exam</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form id="modal-form">
                <input type="hidden" id="e-id" />
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Class *</label>
                        <select class="form-control" id="e-class" required onchange="loadSubjectsForClass()">
                            <option value="">Select</option>
                            <option>6</option>
                            <option>7</option>
                            <option>8</option>
                            <option>9</option>
                            <option>10</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Exam Type *</label>
                        <select class="form-control" id="e-type" required>
                            <option>FA1</option>
                            <option>FA2</option>
                            <option>SA1</option>
                            <option>SA2</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label class="form-label">Subject *</label><select class="form-control"
                        id="e-subject" required></select></div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Exam Date *</label><input class="form-control"
                            id="e-date" type="date" required /></div>
                    <div class="form-group"><label class="form-label">Start Time *</label><input class="form-control"
                            id="e-start" type="time" required /></div>
                </div>
                <div class="form-group"><label class="form-label">Duration (minutes)</label><input class="form-control"
                        id="e-duration" type="number" value="180" min="30" /></div>
                <div class="form-group">
                    <label class="form-label">Syllabus (Topics)</label>
                    <textarea class="form-control" id="e-topics" rows="2"
                        placeholder="Enter comma-separated topics..."></textarea>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.5rem">
                    <button type="button" class="btn btn-danger btn-sm" id="del-btn" onclick="deleteExam()"
                        style="display:none">🗑️ Delete</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/admin-sidebar.js"></script>
    <script>
        document.getElementById('sidebar-container').innerHTML = buildAdminSidebar('exams');
        document.getElementById('topbar-container').innerHTML = buildAdminTopBar('Exam Schedule');

        let all = [], allSubjects = [];

        async function loadSubjectsForClass() {
            const cls = document.getElementById('e-class').value;
            if (!cls) { document.getElementById('e-subject').innerHTML = '<option>Select class first</option>'; return; }
            const subs = allSubjects.filter(s => s.class == cls);
            document.getElementById('e-subject').innerHTML = subs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        async function loadExams() {
            const cls = document.getElementById('filter-class').value;
            all = await api('GET', cls ? `/api/admin/exams?class=${cls}` : '/api/admin/exams');
            filterRender();
        }

        function filterRender() {
            const et = document.getElementById('filter-exam').value;
            const list = et ? all.filter(e => e.exam_type === et) : all;
            document.getElementById('ecount').textContent = `${list.length} exam(s)`;
            document.getElementById('tbody').innerHTML = list.map(e => `<tr>
      <td>Class ${e.class}</td>
      <td>${e.subject_name}</td>
      <td><span class="badge badge-primary" style="font-size:.72rem">${e.exam_type}</span></td>
      <td>${fmtDate(e.exam_date)}</td>
      <td>${e.start_time}</td>
      <td>${e.duration_mins} min</td>
      <td style="max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${e.topics || ''}">${e.topics || '—'}</td>
      <td><button class="btn btn-primary btn-sm" onclick="openEdit(${e.id})">✏️ Edit</button></td>
    </tr>`).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:2rem">No exams found.</td></tr>';
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = '➕ Add Exam Entry';
            document.getElementById('e-id').value = '';
            document.getElementById('modal-form').reset();
            document.getElementById('del-btn').style.display = 'none';
            document.getElementById('modal').classList.add('open');
        }

        function openEdit(id) {
            const e = all.find(x => x.id === id);
            document.getElementById('modal-title').textContent = '✏️ Edit Exam';
            document.getElementById('e-id').value = e.id;
            document.getElementById('e-class').value = e.class;
            loadSubjectsForClass().then(() => { document.getElementById('e-subject').value = e.subject_id; });
            document.getElementById('e-type').value = e.exam_type;
            document.getElementById('e-date').value = e.exam_date;
            document.getElementById('e-start').value = e.start_time;
            document.getElementById('e-duration').value = e.duration_mins;
            document.getElementById('e-topics').value = e.topics || '';
            document.getElementById('del-btn').style.display = '';
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() { document.getElementById('modal').classList.remove('open'); }

        document.getElementById('modal-form').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('e-id').value;
            const payload = {
                class: document.getElementById('e-class').value,
                subject_id: document.getElementById('e-subject').value,
                exam_type: document.getElementById('e-type').value,
                exam_date: document.getElementById('e-date').value,
                start_time: document.getElementById('e-start').value,
                duration_mins: document.getElementById('e-duration').value,
                topics: document.getElementById('e-topics').value
            };
            try {
                if (id) await api('PUT', `/api/admin/exams/${id}`, payload);
                else await api('POST', '/api/admin/exams', payload);
                showToast(id ? 'Exam updated!' : 'Exam added!', 'success');
                closeModal(); loadExams();
            } catch (err) { showToast(err.message, 'error'); }
        });

        async function deleteExam() {
            const id = document.getElementById('e-id').value;
            if (!id || !confirm('Delete this exam entry?')) return;
            await api('DELETE', `/api/admin/exams/${id}`);
            showToast('Deleted', 'success'); closeModal(); loadExams();
        }

        (async () => {
            await initAdminPage();
            allSubjects = await api('GET', '/api/admin/subjects');
            await loadExams();
            hideLoader();
        })();
    </script>
</body>

</html>
